name: flutter_boilerplate
description: "Flutter Boilerplate"
publish_to: "none"
version: 1.3.0+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2
  timezone: ^0.11.0
  provider: ^6.1.5+1
  flutter_secure_storage: ^10.2.0
  flutter_svg: ^2.3.0
  app_settings: ^7.0.0
  sentry_flutter: ^9.20.0
  font_awesome_flutter: ^11.0.0
  go_router: ^17.2.3
  skeletonizer: ^2.1.3
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  app_version_update: ^6.2.0
  fpdart: ^1.2.0
  equatable: ^2.0.8
  device_info_plus: ^12.4.0
  logger: ^2.7.0
  http: ^1.6.0
  internet_connection_checker_plus: ^3.0.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  sentry_dart_plugin: ^3.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/icons/
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter_boilerplate
  org: victorzarzar
